name: build-ci

on:
  push:

env:
  LLVM_VERSION: llvmorg-15.0.7
  WINE_VERSION: v8.16-3shain
  WINE_URL: https://github.com/3Shain/wine/releases/download/v8.16-3shain/wine.tar.gz
  HOMEBREW_NO_AUTO_UPDATE: "1"
  HOMEBREW_NO_INSTALL_CLEANUP: "1"

jobs:
  setup-wine:
    runs-on: macos-14

    steps:
      - name: Restore Wine cache
        id: cache-wine
        uses: actions/cache/restore@v4
        with:
          key: wine-x86_64-${{ env.WINE_VERSION }}-macos
          restore-keys: |
            wine-x86_64-${{ env.WINE_VERSION }}-
          path: toolchains/wine

      - name: Install Wine
        if: steps.cache-wine.outputs.cache-hit != 'true'
        run: |
          mkdir -p toolchains/wine
          curl -SL "${{ env.WINE_URL }}" > wine.tar.gz
          tar -zxf wine.tar.gz -C toolchains/wine
          rm wine.tar.gz

      - name: Save Wine cache
        if: steps.cache-wine.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          key: wine-x86_64-${{ env.WINE_VERSION }}-macos
          path: toolchains/wine

  setup-llvm-darwin:
    runs-on: macos-14

    steps:
      - name: Restore LLVM Darwin cache
        id: cache-llvm-darwin
        uses: actions/cache/restore@v4
        with:
          key: llvm-darwin-${{ env.LLVM_VERSION }}-x86_64-macos
          restore-keys: |
            llvm-darwin-${{ env.LLVM_VERSION }}-x86_64-
          path: toolchains/llvm-darwin

      - name: Build LLVM for Darwin x86_64
        if: steps.cache-llvm-darwin.outputs.cache-hit != 'true'
        run: |
          brew install ninja
          mkdir -p toolchains
          git clone --depth 1 --branch "${{ env.LLVM_VERSION }}" https://github.com/llvm/llvm-project.git toolchains/llvm-project
          cmake -S toolchains/llvm-project/llvm -B toolchains/llvm-darwin-build -G Ninja \
            -DCMAKE_INSTALL_PREFIX="$(pwd)/toolchains/llvm-darwin" \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DLLVM_HOST_TRIPLE=x86_64-apple-darwin \
            -DLLVM_ENABLE_ASSERTIONS=On \
            -DLLVM_ENABLE_ZSTD=Off \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_TARGETS_TO_BUILD="" \
            -DLLVM_BUILD_TOOLS=Off \
            -DBUG_REPORT_URL="https://github.com/gamesir-labs/dxmt" \
            -DPACKAGE_VENDOR="DXMT" \
            -DLLVM_VERSION_PRINTER_SHOW_HOST_TARGET_INFO=Off
          cmake --build toolchains/llvm-darwin-build
          cmake --install toolchains/llvm-darwin-build
          rm -rf toolchains/llvm-project toolchains/llvm-darwin-build

      - name: Save LLVM Darwin cache
        if: steps.cache-llvm-darwin.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          key: llvm-darwin-${{ env.LLVM_VERSION }}-x86_64-macos
          path: toolchains/llvm-darwin

  windows-cross-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build mingw-w64

      - name: Configure
        run: |
          cmake -S . -B build/windows-cross -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=test/toolchains/windows-x86_64-mingw.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DAPITRACE_BUILD_TOOLS=ON \
            -DAPITRACE_BUILD_WINDOWS_DLLS=ON \
            -DAPITRACE_BUILD_METAL_BACKEND=OFF

      - name: Build package targets
        run: |
          cmake --build build/windows-cross --target \
            apitrace_retrace \
            apitrace_platform_windows_d3d11 \
            apitrace_platform_windows_d3d12

      - name: Assemble artifact
        run: |
          rm -rf dist
          mkdir -p dist/retrace dist/override
          cp build/windows-cross/retrace.exe dist/retrace/
          cp build/windows-cross/d3d11.dll dist/override/
          cp build/windows-cross/d3d12.dll dist/override/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apitrace-windows-retrace-and-override-${{ github.sha }}
          path: dist/
          if-no-files-found: error

  macos-d3d-wine:
    runs-on: macos-14
    needs: [setup-wine, setup-llvm-darwin]

    steps:
      - name: Checkout apitrace
        uses: actions/checkout@v4

      - name: Checkout DXMT
        uses: actions/checkout@v4
        with:
          repository: gamesir-labs/dxmt
          path: dxmt
          submodules: recursive

      - name: Restore Wine cache
        uses: actions/cache/restore@v4
        with:
          key: wine-x86_64-${{ env.WINE_VERSION }}-macos
          path: toolchains/wine

      - name: Restore LLVM Darwin cache
        uses: actions/cache/restore@v4
        with:
          key: llvm-darwin-${{ env.LLVM_VERSION }}-x86_64-macos
          path: toolchains/llvm-darwin

      - name: Install tools
        run: |
          brew install cmake ninja mingw-w64 ccache
          pip3 install meson==1.10.0 --break-system-packages

      - name: Prepare adjacent runtime layout
        run: |
          ln -sfn "$GITHUB_WORKSPACE/dxmt" "$GITHUB_WORKSPACE/../dxmt"
          ln -sfn "$GITHUB_WORKSPACE/toolchains/wine" "$GITHUB_WORKSPACE/../wine-enviroment"

      - name: Build apitrace native support
        run: |
          cmake -S . -B build/macos-dxmt-x86_64 -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DAPITRACE_BUILD_METAL_BACKEND=ON \
            -DAPITRACE_BUILD_TOOLS=ON
          cmake --build build/macos-dxmt-x86_64
          cmake -S . -B build/cmake-arm64 -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DAPITRACE_BUILD_METAL_BACKEND=ON \
            -DAPITRACE_BUILD_TOOLS=ON
          cmake --build build/cmake-arm64

      - name: Configure DXMT builtin runtime
        run: |
          cd "$GITHUB_WORKSPACE/dxmt"
          meson setup --cross-file build-win64.txt \
            -Denable_nvapi=true \
            -Denable_nvngx=true \
            -Dnative_llvm_path="$GITHUB_WORKSPACE/toolchains/llvm-darwin" \
            -Dwine_build_path= \
            -Dwine_install_path="$GITHUB_WORKSPACE/toolchains/wine" \
            -Dapitrace_source_path="$GITHUB_WORKSPACE" \
            -Dapitrace_build_path="$GITHUB_WORKSPACE/build/macos-dxmt-x86_64" \
            --buildtype debugoptimized \
            --prefix /usr/local \
            build-gs-native-builtin

      - name: Run D3D11 module
        run: scripts/test-d3d11.sh

      - name: Run D3D12 module
        run: scripts/test-d3d12.sh

      - name: Run D3D to Metal link module
        run: scripts/test-d3d-metal-link.sh

  macos-native-metal:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: brew install cmake ninja

      - name: Configure
        run: |
          cmake -S . -B build/macos-native -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DAPITRACE_BUILD_METAL_BACKEND=ON \
            -DAPITRACE_BUILD_TOOLS=ON

      - name: Build
        run: |
          cmake --build build/macos-native --target \
            apitrace_retrace \
            apitrace_platform_apple_metal

      - name: Run metal test
        run: scripts/test-metal.sh

      - name: Assemble artifact
        run: |
          rm -rf dist
          mkdir -p dist/metal
          cp build/macos-native/retrace dist/metal/
          cp build/macos-native/libapitrace_platform_apple_metal.a dist/metal/
          cp src/metal/include/apitrace/metal_capi.h dist/metal/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apitrace-macos-native-metal-${{ github.sha }}
          path: dist/metal/
          if-no-files-found: error
