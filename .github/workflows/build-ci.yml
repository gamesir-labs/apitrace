name: build-ci

on:
  push:

jobs:
  windows-cross-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build mingw-w64

      - name: Configure
        run: |
          cmake -S . -B build/windows-cross -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=test/toolchains/windows-x86_64-mingw.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DAPITRACE_BUILD_TOOLS=ON \
            -DAPITRACE_BUILD_WINDOWS_DLLS=ON \
            -DAPITRACE_BUILD_METAL_BACKEND=OFF

      - name: Build package targets
        run: |
          cmake --build build/windows-cross --target \
            apitrace_retrace \
            apitrace_platform_windows_d3d11 \
            apitrace_platform_windows_d3d12

      - name: Assemble artifact
        run: |
          rm -rf dist
          mkdir -p dist/retrace dist/override
          cp build/windows-cross/retrace.exe dist/retrace/
          cp build/windows-cross/d3d11.dll dist/override/
          cp build/windows-cross/d3d12.dll dist/override/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apitrace-windows-retrace-and-override-${{ github.sha }}
          path: dist/
          if-no-files-found: error

  macos-native-metal:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ninja
        run: brew install ninja

      - name: Configure
        run: |
          cmake -S . -B build/macos-native -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DAPITRACE_BUILD_METAL_BACKEND=ON \
            -DAPITRACE_BUILD_TOOLS=ON

      - name: Build
        run: |
          cmake --build build/macos-native --target \
            apitrace_retrace \
            apitrace_platform_apple_metal

      - name: Run metal test
        run: scripts/test-metal.sh

      - name: Assemble artifact
        run: |
          rm -rf dist
          mkdir -p dist/metal
          cp build/macos-native/retrace dist/metal/
          cp build/macos-native/libapitrace_platform_apple_metal.a dist/metal/
          cp src/metal/include/apitrace/metal_capi.h dist/metal/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apitrace-macos-native-metal-${{ github.sha }}
          path: dist/metal/
          if-no-files-found: error
