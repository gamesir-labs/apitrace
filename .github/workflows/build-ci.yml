name: build-ci

on:
  push:

env:
  HOMEBREW_NO_AUTO_UPDATE: "1"
  HOMEBREW_NO_INSTALL_CLEANUP: "1"
  HOMEBREW_NO_ENV_HINTS: "1"

jobs:
  windows-cross-package:
    runs-on: self-macos-runner

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install tools
        run: |
          if ! command -v brew >/dev/null 2>&1; then
            echo "::error::Homebrew is required on the self-hosted runner"
            exit 1
          fi
          brew list --formula cmake >/dev/null 2>&1 || brew install --formula cmake
          brew list --formula ninja >/dev/null 2>&1 || brew install --formula ninja
          brew list --formula mingw-w64 >/dev/null 2>&1 || brew install --formula mingw-w64

      - name: Configure
        run: |
          cmake -S . -B build/windows-cross -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=test/toolchains/windows-x86_64-mingw.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DAPITRACE_BUILD_TOOLS=ON \
            -DAPITRACE_BUILD_WINDOWS_DLLS=ON \
            -DAPITRACE_BUILD_METAL_BACKEND=OFF

      - name: Build package targets
        run: |
          cmake --build build/windows-cross --target \
            apitrace_retrace \
            apitrace_platform_windows_d3d11 \
            apitrace_platform_windows_d3d12

      - name: Assemble artifact
        run: |
          rm -rf dist/windows
          mkdir -p dist/windows/retrace dist/windows/override
          cp build/windows-cross/retrace.exe dist/windows/retrace/
          cp build/windows-cross/d3d11.dll dist/windows/override/
          cp build/windows-cross/d3d12.dll dist/windows/override/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apitrace-windows-retrace-and-override-${{ github.sha }}
          path: dist/windows/
          if-no-files-found: error

  macos-native-metal:
    runs-on: self-macos-runner

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install tools
        run: |
          if ! command -v brew >/dev/null 2>&1; then
            echo "::error::Homebrew is required on the self-hosted runner"
            exit 1
          fi
          brew list --formula cmake >/dev/null 2>&1 || brew install --formula cmake
          brew list --formula ninja >/dev/null 2>&1 || brew install --formula ninja

      - name: Configure
        run: |
          cmake -S . -B build/macos-native -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DAPITRACE_BUILD_METAL_BACKEND=ON \
            -DAPITRACE_BUILD_TOOLS=ON

      - name: Build package targets
        run: |
          cmake --build build/macos-native --target \
            apitrace_retrace \
            apitrace_platform_apple_metal

      - name: Assemble artifact
        run: |
          rm -rf dist/metal
          mkdir -p dist/metal
          cp build/macos-native/retrace dist/metal/
          cp build/macos-native/libapitrace_platform_apple_metal.a dist/metal/
          cp src/metal/include/apitrace/metal_capi.h dist/metal/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apitrace-macos-native-metal-${{ github.sha }}
          path: dist/metal/
          if-no-files-found: error
